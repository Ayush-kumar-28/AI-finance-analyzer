services:
  - type: web
    name: finance-tracker-ml-service
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./finance_tracker.db
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
