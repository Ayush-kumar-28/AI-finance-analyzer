services:
  - type: web
    name: finance-tracker-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: ML_SERVICE_URL
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
